name: "PRowl"
description: "The multi-agent PR reviewer that never misses a bug. Detects issues with a fast model, explains and fixes them with a smarter one. Works with any LLM provider."
inputs:
  GITHUB_TOKEN:
    description: "GitHub token to interact with the repository."
    required: true
  LLM_API_KEY:
    description: "API key for your chosen LLM provider (OpenAI, Anthropic, Google, etc.). Bring Your Own Key (BYOK)."
    required: true
  LLM_MODEL:
    description: "Model name (e.g., gpt-4o, claude-3-5-sonnet-20241022, gemini/gemini-pro, azure/gpt-4)."
    required: false
    default: "gpt-4o"
  LLM_BASE_URL:
    description: "Optional: Custom LiteLLM proxy endpoint URL. Leave empty for direct provider calls."
    required: false
    default: ""
  LLM_REVIEWER_MODEL:
    description: "Fast/cheap model for issue detection (falls back to LLM_MODEL if not set)."
    required: false
    default: ""
  LLM_FIXER_MODEL:
    description: "Smarter model for explanation and fix generation (falls back to LLM_MODEL if not set)."
    required: false
    default: ""
  exclude:
    description: "Glob patterns to exclude files from the diff analysis"
    required: false
    default: ""
  CONTEXT_LINES:
    description: "Unchanged lines kept around each +/- in the TOON diff (lower = cheaper, higher = more context). Set 0 to drop all context."
    required: false
    default: "2"
  ENABLE_CACHE:
    description: "Cache LLM responses by chunk hash across runs in the same job. Set 'false' to disable."
    required: false
    default: "true"
  SEMGREP_RULES:
    description: "Optional: comma-separated Semgrep rulesets (e.g. 'p/security-audit,p/owasp-top-ten'). If set and 'semgrep' is on PATH, findings are passed to Agent 1 as priors."
    required: false
    default: ""
  DISCORD_WEBHOOK_URL:
    description: "Optional: Discord webhook URL for commit/review notifications"
    required: false
    default: ""
  SLACK_BOT_TOKEN:
    description: "Optional: Slack bot token (xoxb-...) for threaded notifications"
    required: false
    default: ""
  SLACK_CHANNEL_ID:
    description: "Optional: Slack channel ID used with SLACK_BOT_TOKEN"
    required: false
    default: ""
  SLACK_WEBHOOK_URL:
    description: "Optional: Slack incoming webhook URL (fallback, non-threaded)"
    required: false
    default: ""
runs:
  using: "node20"
  main: "dist/index.js"
branding:
  icon: "aperture"
  color: "green"
