name: Reviewer Evals

# Manual-only: evals call a live model and cost tokens, so they never run on
# every PR and never block merges. Trigger from the Actions tab when you change
# prompts or swap models.
on:
  workflow_dispatch:
    inputs:
      model:
        description: "Reviewer model to evaluate"
        required: false
        default: "gpt-4o-mini"

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run reviewer evals
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ github.event.inputs.model }}
        run: npm run eval
